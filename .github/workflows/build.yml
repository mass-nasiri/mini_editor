# .github/workflows/build.yml
name: Build Compact Frameless Editor

on: 
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Initialize Module and Build Precision Binary
        run: |
          go mod tidy
          go build -ldflags="-H windowsgui -s -w" -o mini_editor.exe main.go

      - name: Deploy to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Production Frameless Release"
          body: "Ultra-lightweight borderless local workspace manager engine with dynamic split preview."
          draft: false
          prerelease: false
          files: mini_editor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
