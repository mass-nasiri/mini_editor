# .github/workflows/build.yml
name: Build and Release Go Editor

on: 
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Windows Resource Compiler
        run: go install github.com/tc-hib/go-winres@latest

      - name: Initialize and Embed Metadata Automatically
        run: |
          go mod init mini_html_editor
          go get github.com/webview/webview_go
          go mod tidy
          
          # 1. Let the tool generate a perfect standard windows resource structure
          go-winres init
          
          # 2. Safely swap the default icon with your custom app.ico if it exists
          if (Test-Path "app.ico") {
              Copy-Item "app.ico" "winres/icon.ico" -Force
          }
          
          # 3. Compile the embedded syso structure flawlessly
          go-winres make

      - name: Compile Lightweight Signed-Like Binary
        run: go build -ldflags="-H windowsgui -s -w" -o mini_editor.exe main.go

      - name: Deploy to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Production Build"
          body: "Fully Offline and Multi-tabbed ArchFlow Engine compiled with automated system metadata blocks."
          draft: false
          prerelease: false
          files: mini_editor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
