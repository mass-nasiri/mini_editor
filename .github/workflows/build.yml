# .github/workflows/build.yml
name: Build Go Editor

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Initialize Module and Build
        run: |
          go mod init mini_html_editor
          go get github.com/webview/webview_go
          go build -ldflags="-H windowsgui" -o mini_editor.exe main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-html-editor-windows
          path: mini_editor.exe
