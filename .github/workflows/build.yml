# .github/workflows/build.yml
name: Build Compact Frameless Editor

on: 
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Windows Resource Compiler
        run: go install github.com/tc-hib/go-winres@latest

      - name: Process App Icon and Embed Assets
        run: |
          go mod tidy
          # Build empty boilerplate structure
          go-winres init
          # If your custom app.ico exists in root, force swap it to be the main binary icon
          if (Test-Path "app.ico") {
              Copy-Item "app.ico" "winres/icon.ico" -Force
          }
          # Create the native .syso file containing resource properties
          go-winres make

      - name: Compile Precision Binary with Embedded Resources
        run: go build -ldflags="-H windowsgui -s -w" -o mini_editor.exe main.go

      - name: Deploy to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Production Frameless Release"
          body: "Ultra-lightweight borderless local workspace manager compiled with high-res icon sheets."
          draft: false
          prerelease: false
          files: mini_editor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
