# .github/workflows/build.yml
name: Build and Release Go Editor

on: 
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Windows Resource Compiler
        run: go install github.com/tc-hib/go-winres@latest

      - name: Initialize Module and Embed Metadata
        run: |
          go mod init mini_html_editor
          go get github.com/webview/webview_go
          # Injecting Icon and Information directly into binary structures
          go-winres make --icon app.ico --in versioninfo.json

      - name: Compile Lightweight Signed-Like Binary
        run: go build -ldflags="-H windowsgui -s -w" -o mini_editor.exe main.go

      - name: Deploy to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Production Build"
          body: "Fully Offline and Multi-tabbed ArchFlow Engine compiled seamlessly."
          draft: false
          prerelease: false
          files: mini_editor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
