<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Live Workspace</title>
    <style>
        :root { --bg: #121212; --panel: #1a1a1a; --text: #e0e0e0; --accent: #2d2d2d; --active: #1e1e1e; --border: #252525; }
        * { box-sizing: border-box; user-select: none; }
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        .top-bar { display: flex; background: var(--panel); height: 35px; border-bottom: 1px solid var(--border); align-items: center; justify-content: space-between; position: relative; }
        .left-controls { display: flex; align-items: center; height: 100%; flex: 1; overflow: hidden; }
        
        .menu-btn { background: transparent; border: none; color: #aaa; width: 35px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .menu-btn:hover { background: #252525; color: #fff; }
        .dropdown { display: none; position: absolute; top: 35px; left: 0; background: var(--panel); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); z-index: 1000; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .dropdown button { background: transparent; border: none; color: var(--text); width: 100%; padding: 12px 20px; text-align: left; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; }
        .dropdown button:hover { background: #252525; color: #fff; }
        .shortcut-hint { color: #555; font-family: monospace; font-size: 11px; margin-left: 20px; }

        .tabs-container { display: flex; height: 100%; align-items: flex-end; overflow-x: auto; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab { display: flex; align-items: center; gap: 6px; background: #151515; border-right: 1px solid var(--border); padding: 0 16px; height: 35px; cursor: pointer; font-size: 12px; color: #888; position: relative; flex-shrink: 0; }
        .tab.active { background: var(--bg); color: #fff; font-weight: 500; }
        .tab .close-tab { font-size: 14px; margin-left: 4px; display: inline-block; width: 12px; height: 12px; line-height: 12px; text-align: center; }
        .tab .close-tab:hover { color: #ff5f56; }

        .window-controls { display: flex; height: 100%; align-items: center; flex-shrink: 0; background: var(--panel); z-index: 101; }
        .win-btn { background: transparent; border: none; color: #888; width: 45px; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; }
        .win-btn:hover { background: #252525; color: #fff; }
        .win-btn.close:hover { background: #e81123; color: #fff; }

        .workspace { display: flex; flex: 1; height: calc(100vh - 67px); position: relative; background: var(--bg); }
        .editor-box { width: 100%; height: 100%; display: flex; position: relative; overflow: hidden; }
        
        .line-numbers { width: 45px; background: #151515; color: #555; text-align: right; padding: 15px 8px 15px 0; font-family: monospace; font-size: 13px; line-height: 1.5; overflow: hidden; border-right: 1px solid var(--border); }
        .code-area { flex: 1; height: 100%; font-family: monospace; font-size: 13px; padding: 15px; box-sizing: border-box; resize: none; border: none; background: var(--bg); color: #f8f8f2; outline: none; line-height: 1.5; overflow-y: auto; user-select: text; }
        
        .preview-box { width: 100%; height: 100%; background: #ffffff; display: none; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        .status-bar { height: 32px; background: #151515; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-size: 12px; color: #777; }
        .status-left { display: flex; gap: 15px; }
        .status-right { display: flex; align-items: center; gap: 15px; }
        
        .view-modes { display: flex; background: #202020; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
        .view-modes label { padding: 4px 12px; font-size: 11px; cursor: pointer; color: #888; transition: all 0.2s; }
        .view-modes input { display: none; }
        .view-modes input:checked + label { background: #333; color: #fff; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="left-controls">
            <button class="menu-btn" id="menuBtn">☰</button>
            <div class="dropdown" id="menuDropdown">
                <button onclick="createNewTab()">New File <span class="shortcut-hint">Ctrl+N</span></button>
                <button onclick="openLocalFile()">Open File... <span class="shortcut-hint">Ctrl+O</span></button>
                <button onclick="saveLocalFile()">Save File <span class="shortcut-hint">Ctrl+S</span></button>
                <button onclick="window.closeApp()">Exit <span class="shortcut-hint">Ctrl+X</span></button>
            </div>
            <div class="tabs-container" id="tabsBar"></div>
        </div>
        <div class="window-controls">
            <button class="win-btn" onclick="window.minimizeApp()">−</button>
            <button class="win-btn" onclick="window.maximizeApp()">🗖</button>
            <button class="win-btn close" onclick="window.closeApp()">×</button>
        </div>
    </div>

    <div class="workspace" id="workspaceContainer">
        <div class="editor-box" id="editorPanel">
            <div class="line-numbers" id="lineNumbers">1</div>
            <textarea class="code-area" id="editor" spellcheck="false" placeholder="Begin drafting..."></textarea>
        </div>
        <div class="preview-box" id="previewPanel">
            <iframe id="preview"></iframe>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-left">
            <span id="statLines">Lines: 1</span>
            <span id="statChars">Chars: 0</span>
        </div>
        <div class="status-right">
            <div class="view-modes" id="viewModesContainer" style="display: none;">
                <input type="radio" id="modeEdit" name="viewMode" value="edit" checked>
                <label for="modeEdit">Edit</label>
                
                <input type="radio" id="modePreview" name="viewMode" value="preview">
                <label for="modePreview">Preview</label>
            </div>
        </div>
    </div>

    <script>
        let tabs = [{ id: 1, name: "untitled.html", code: "", path: "" }];
        let activeTabId = 1;

        const editor = document.getElementById('editor');
        const lineNumbers = document.getElementById('lineNumbers');
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');
        const editorPanel = document.getElementById('editorPanel');
        const previewPanel = document.getElementById('previewPanel');
        const viewModesContainer = document.getElementById('viewModesContainer');

        function updateMenuWidth() {
            const editorRect = editorPanel.getBoundingClientRect();
            menuDropdown.style.width = `${editorRect.width}px`;
        }

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            updateMenuWidth();
            menuDropdown.style.display = menuDropdown.style.display === 'block' ? 'none' : 'block';
        });
        document.addEventListener('click', () => menuDropdown.style.display = 'none');

        function applyLayoutRatio() {
            const currentTab = tabs.find(t => t.id === activeTabId);
            const isHtml = currentTab && currentTab.name.endsWith('.html');
            
            if (!isHtml) {
                editorPanel.style.display = 'flex';
                previewPanel.style.display = 'none';
                return;
            }

            const selectedMode = document.querySelector('input[name="viewMode"]:checked').value;
            if (selectedMode === 'preview') {
                editorPanel.style.display = 'none';
                previewPanel.style.display = 'block';
                updatePreview();
            } else {
                editorPanel.style.display = 'flex';
                previewPanel.style.display = 'none';
            }
            updateMenuWidth();
        }

        document.querySelectorAll('input[name="viewMode"]').forEach(radio => {
            radio.addEventListener('change', applyLayoutRatio);
        });

        function renderTabs() {
            const tabsBar = document.getElementById('tabsBar');
            tabsBar.innerHTML = '';
            tabs.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
                tabEl.onclick = () => switchTab(tab.id);
                tabEl.innerHTML = `
                    <span>${tab.name}</span>
                    <span class="close-tab" onclick="closeTab(event, ${tab.id})">×</span>
                `;
                tabsBar.appendChild(tabEl);
            });
        }

        function switchTab(id) {
            const currentTab = tabs.find(t => t.id === activeTabId);
            if (currentTab) currentTab.code = editor.value;

            activeTabId = id;
            const nextTab = tabs.find(t => t.id === id);
            editor.value = nextTab ? nextTab.code : "";
            
            if (nextTab && nextTab.name.endsWith('.html')) {
                viewModesContainer.style.display = 'flex';
            } else {
                viewModesContainer.style.display = 'none';
                document.getElementById('modeEdit').checked = true;
            }

            renderTabs();
            applyLayoutRatio();
            updateEditorStats();
        }

        function createNewTab() {
            const newId = tabs.length > 0 ? Math.max(...tabs.map(t => t.id)) + 1 : 1;
            tabs.push({ id: newId, name: `untitled-${newId}.html`, code: "", path: "" });
            switchTab(newId);
        }

        function closeTab(event, id) {
            if (event) event.stopPropagation();
            if (tabs.length === 1) return;
            tabs = tabs.filter(t => t.id !== id);
            if (activeTabId === id) activeTabId = tabs[0].id;
            renderTabs();
            switchTab(activeTabId);
        }

        // Bridge function connecting to native Go file prompt dialog
        async function openLocalFile() {
            if (window.nativeOpenDialog) {
                window.nativeOpenDialog().then(resultJson => {
                    if (!resultJson) return;
                    const res = JSON.parse(resultJson);
                    if (!res.Path) return;

                    const newId = tabs.length > 0 ? Math.max(...tabs.map(t => t.id)) + 1 : 1;
                    tabs.push({ id: newId, name: res.Name, code: res.Content, path: res.Path });
                    switchTab(newId);
                });
            }
        }

        // Bridge function connecting to native Go save system
        async function saveLocalFile() {
            const currentTab = tabs.find(t => t.id === activeTabId);
            if (!currentTab) return;

            if (window.nativeSaveDialog) {
                window.nativeSaveDialog(currentTab.path, currentTab.name, editor.value).then(updatedPath => {
                    if (!updatedPath) return;
                    currentTab.path = updatedPath;
                    currentTab.name = updatedPath.split('\\').pop().split('/').pop();
                    
                    if (currentTab.name.endsWith('.html')) {
                        viewModesContainer.style.display = 'flex';
                    } else {
                        viewModesContainer.style.display = 'none';
                        document.getElementById('modeEdit').checked = true;
                    }
                    renderTabs();
                    applyLayoutRatio();
                });
            }
        }

        function updateEditorStats() {
            const text = editor.value;
            const lines = text.split('\n');
            
            let numHtml = '';
            for (let i = 1; i <= lines.length; i++) { numHtml += i + '<br>'; }
            lineNumbers.innerHTML = numHtml;

            document.getElementById('statLines').innerText = `Lines: ${lines.length}`;
            document.getElementById('statChars').innerText = `Chars: ${text.length}`;
        }

        function updatePreview() {
            const currentTab = tabs.find(t => t.id === activeTabId);
            if (currentTab && currentTab.name.endsWith('.html')) {
                const iframe = document.getElementById('preview');
                const doc = iframe.contentWindow.document;
                doc.open();
                doc.write(editor.value);
                doc.close();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey) {
                const key = e.key.toLowerCase();
                if (key === 's') {
                    e.preventDefault();
                    saveLocalFile();
                } else if (key === 'o') {
                    e.preventDefault();
                    openLocalFile();
                } else if (key === 'n') {
                    e.preventDefault();
                    createNewTab();
                } else if (key === 'w') {
                    e.preventDefault();
                    closeTab(null, activeTabId);
                } else if (key === 'x' && editor !== document.activeElement) {
                    e.preventDefault();
                    window.closeApp();
                }
            }
        });

        editor.addEventListener('input', () => {
            const currentTab = tabs.find(t => t.id === activeTabId);
            if (currentTab) currentTab.code = editor.value;
            updateEditorStats();
        });

        editor.addEventListener('scroll', () => {
            lineNumbers.scrollTop = editor.scrollTop;
        });

        window.addEventListener('resize', updateMenuWidth);

        renderTabs();
        updateEditorStats();
        applyLayoutRatio();
    </script>
</body>
</html>
